<!-- component that allows you to enter projectXML -->
<div class="container-fluid">
    <div class="my-3 p-3 bg-body rounded shadow-sm user-select-none">
        <h6 class="border-bottom pb-2 mb-0 d-flex align-items-center justify-content-between">
            <span>Project XML</span>
            <button type="button" class="btn" (click)="open(content)" [class.btn-success]="isXmlValid"
                [class.btn-danger]="!isXmlValid">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-code-square" viewBox="0 0 16 16">
                    <path
                        d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z">
                    </path>
                    <path
                        d="M6.854 4.646a.5.5 0 0 1 0 .708L4.207 8l2.647 2.646a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 0 1 .708 0m2.292 0a.5.5 0 0 0 0 .708L11.793 8l-2.647 2.646a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708 0">
                    </path>
                </svg>
                Preview
            </button>
        </h6>
        <div class="d-flex text-body-secondary pt-3">
            <div class="form-floating w-100">
                <textarea (input)="onInputChange($event)" class="form-control border-3"
                    [class.border-success]="isXmlValid" [class.border-danger]="!isXmlValid"
                    id="floatingTextarea"></textarea>
                <label for="floatingTextarea">Project XML</label>
            </div>
        </div>
    </div>
</div>

<div class="d-flex justify-content-evenly">
    <app-key-phrases [phrases]="environmentKeyPhrases" title="Environment Effect Key Phrases"></app-key-phrases>
    <app-key-phrases [phrases]="backgroundKeyPhrases" title="Background Effect Key Phrases"></app-key-phrases>
</div>

<!-- Modal -->
<ng-template #content let-modal>
    <div class="modal-header user-select-none">
        <h4 class="modal-title">Project XML</h4>
        <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body user-select-none" style="max-height: 500px; overflow-y: auto;">
        <pre>{{ formattedXml }}</pre>
    </div>
    <div class="modal-footer user-select-none">
        <button type="button" class="btn btn-secondary" (click)="modal.close()">Close</button>
    </div>
</ng-template>
